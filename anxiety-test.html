<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Тест тревожности</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0f172a;
color:#fff;
margin:0;
padding:40px;
display:flex;
justify-content:center;
}

.container{
max-width:700px;
width:100%;
background:#111827;
padding:30px;
border-radius:12px;
}

h1{
margin-top:0;
}

.instructions{
font-size:16px;
color:#cbd5e1;
margin-bottom:30px;
}

.question{
font-size:20px;
margin-bottom:20px;
}

.answers label{
display:block;
margin:8px 0;
cursor:pointer;
}

.buttons{
margin-top:30px;
display:flex;
gap:12px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.next{background:#22c55e;color:#000}
.prev{background:#334155;color:#fff}
.download{background:#38bdf8;color:#000;margin-top:20px}

.result{
display:none;
margin-top:30px;
}

.scale{
margin-top:20px;
height:18px;
background:linear-gradient(90deg,#22c55e,#facc15,#ef4444);
border-radius:10px;
position:relative;
}

.marker{
width:4px;
height:28px;
background:#fff;
position:absolute;
top:-5px;
}

</style>
</head>

<body>

<div class="container">

<h1>Тест тревожности</h1>

<div class="instructions">
Отметьте, насколько каждый из перечисленных симптомов беспокоил вас в течение последней недели.  
В тесте 33 вопроса.
<br><br>
0 — ни разу<br>
1 — иногда<br>
2 — умеренно<br>
3 — часто
</div>

<div id="quiz"></div>

<div class="buttons">
<button class="prev" onclick="prevQuestion()">Назад</button>
<button class="next" onclick="nextQuestion()">Далее</button>
</div>

<div class="result" id="result">

<h2>Ваш результат</h2>

<div id="scoreText"></div>

<div class="scale">
<div class="marker" id="marker"></div>
</div>

<button class="download" onclick="downloadCard()">Скачать карточку результата</button>

</div>

</div>

<script>

const questions=[

"Тревога, нервозность, беспокойство или страх",
"Ощущение напряжения",
"Чувство внутреннего беспокойства",
"Трудности расслабления",
"Раздражительность",
"Чувство надвигающейся опасности",
"Сердцебиение",
"Потливость без физической нагрузки",
"Дрожь или тремор",
"Сухость во рту",
"Ощущение нехватки воздуха",
"Боль или дискомфорт в груди",
"Тошнота или дискомфорт в животе",
"Головокружение",
"Ощущение нереальности происходящего",
"Страх потерять контроль",
"Страх умереть",
"Ощущение покалывания",
"Озноб или приливы жара",
"Трудности концентрации",
"Чрезмерное беспокойство",
"Навязчивые тревожные мысли",
"Беспокойство о будущем",
"Чувство усталости из-за тревоги",
"Нарушения сна",
"Трудности засыпания",
"Ночные пробуждения",
"Чувство напряжения в теле",
"Беспокойство без явной причины",
"Чувство неуверенности",
"Постоянное ожидание плохих новостей",
"Чувство перегруженности",
"Трудности контроля тревоги"

]

let current=0
let answers=new Array(questions.length).fill(null)

function render(){

if(current>=questions.length){
showResult()
return
}

const q=questions[current]

let html="<div class='question'>"+(current+1)+". "+q+"</div>"

html+="<div class='answers'>"

for(let i=0;i<4;i++){

const texts=[
"0 — ни разу",
"1 — иногда",
"2 — умеренно",
"3 — часто"
]

const checked=answers[current]===i?"checked":""

html+=`
<label>
<input type="radio" name="a" value="${i}" ${checked} onchange="setAnswer(${i})">
${texts[i]}
</label>
`
}

html+="</div>"

document.getElementById("quiz").innerHTML=html

}

function setAnswer(v){
answers[current]=v
}

function nextQuestion(){

if(answers[current]===null)return

current++
render()

}

function prevQuestion(){

if(current>0){
current--
render()
}

}

function showResult(){

let sum=answers.reduce((a,b)=>a+b,0)

let level=""

if(sum<=40) level="Низкая тревожность"
else if(sum<=70) level="Умеренная тревожность"
else level="Высокая тревожность"

document.getElementById("quiz").style.display="none"
document.querySelector(".buttons").style.display="none"

document.getElementById("result").style.display="block"

document.getElementById("scoreText").innerHTML=
"Результат: <b>"+sum+" из 99</b><br>"+level

const percent=sum/99*100
document.getElementById("marker").style.left=percent+"%"

window.finalScore=sum
window.finalLevel=level

}

function downloadCard(){

const canvas=document.createElement("canvas")
canvas.width=1200
canvas.height=630

const ctx=canvas.getContext("2d")

ctx.fillStyle="#0f172a"
ctx.fillRect(0,0,1200,630)

ctx.fillStyle="#ffffff"
ctx.font="bold 60px Arial"
ctx.fillText("Тест тревожности",80,140)

ctx.font="bold 90px Arial"
ctx.fillText(finalScore+" из 99",80,300)

ctx.font="40px Arial"
ctx.fillText(finalLevel,80,380)

const date=new Date().toLocaleDateString("ru-RU")

ctx.font="30px Arial"
ctx.fillStyle="#94a3b8"
ctx.fillText("Дата прохождения: "+date,80,460)

ctx.fillText("Пройти тест: t.me/ВАШ_КАНАЛ",80,520)

const link=document.createElement("a")
link.download="test-trevozhnosti.png"
link.href=canvas.toDataURL()
link.click()

}

render()

</script>

</body>
</html>
